<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="calculator.css">
</head>
<body>
<div class="calculator">
    <div class="display"></div>

    <div class="buttons">
  <button class="btn clear">AC</button>
  <button class="btn">&larr;</button>
  <button class="btn">&radic;</button>
  <button class="btn">%</button>

  <button class="btn">7</button>
  <button class="btn">8</button>
  <button class="btn">9</button>
  <button class="btn operator">&divide;</button>

  <button class="btn">4</button>
  <button class="btn">5</button>
  <button class="btn">6</button>
  <button class="btn operator">&times;</button>

  <button class="btn">1</button>
  <button class="btn">2</button>
  <button class="btn">3</button>
  <button class="btn operator">&minus;</button>

  <button class="btn">0</button>
  <button class="btn">&bull;</button>
  <button class="btn">+</button>
  <button class="btn equals">=</button>
</div>
</div> 
      

      


    
</body>
</html>
